services:
  - type: web
    name: webqcv
    runtime: docker
    plan: starter
    disk:
      name: qcv-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATA_DIR
        value: /data
      - key: SESSION_SECRET
        generateValue: true
