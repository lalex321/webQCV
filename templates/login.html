<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q-CV — Sign In</title>
<style>
  :root { --primary: #2563eb; --bg: #f8fafc; --card: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --danger: #dc2626; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px 36px; width: 100%; max-width: 400px; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo img { height: 40px; }
  .logo h1 { font-size: 20px; margin-top: 8px; font-weight: 600; }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
  input[type="email"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 16px; }
  input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  button { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { color: var(--danger); font-size: 13px; margin-bottom: 12px; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Quantori Q-CV</h1>
    <p>Sign in to continue</p>
  </div>
  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@quantori.com" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Password" required>
    <div class="error" id="errorMsg"></div>
    <button type="submit" id="submitBtn">Sign In</button>
  </form>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  var btn = document.getElementById("submitBtn");
  var err = document.getElementById("errorMsg");
  err.textContent = "";
  btn.disabled = true;
  btn.textContent = "Signing in…";
  try {
    var r = await fetch("/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    var data = await r.json();
    if (r.ok && data.ok) {
      location.href = "/";
    } else {
      err.textContent = data.detail || data.error || "Invalid email or password";
    }
  } catch(ex) {
    err.textContent = "Connection error";
  }
  btn.disabled = false;
  btn.textContent = "Sign In";
});
</script>
</body>
</html>
